<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a8db7"/>
      <stop offset="50%" stop-color="#2a6a94"/>
      <stop offset="100%" stop-color="#0b1628"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc3545"/>
      <stop offset="100%" stop-color="#e8713a"/>
    </linearGradient>
  </defs>
  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Decorative shield motif (healthcare symbol) -->
  <g opacity="0.15" transform="translate(100, 80)">
    <path d="M0,0 L60,20 L60,120 Q0,160 -60,120 L-60,20 Z" fill="url(#accent-grad)" stroke="none"/>
    <rect x="-15" y="50" width="8" height="50" fill="#f0f0f0"/>
    <rect x="-35" y="70" width="50" height="8" fill="#f0f0f0"/>
  </g>

  <!-- Main text -->
  <text x="600" y="180" font-family="'Playfair Display', Georgia, serif" font-size="84" font-weight="700" text-anchor="middle" fill="#f0f0f0" letter-spacing="-2">Medicare Great</text>

  <!-- Tagline -->
  <text x="600" y="270" font-family="'Inter', system-ui, sans-serif" font-size="48" text-anchor="middle" fill="#4a8db7" font-weight="300">Healthcare Insurance &amp; Retirement Planning</text>

  <!-- Accent line -->
  <rect x="350" y="310" width="500" height="3" fill="url(#accent-grad)" rx="2"/>

  <!-- Subtitle -->
  <text x="600" y="400" font-family="'Inter', system-ui, sans-serif" font-size="32" text-anchor="middle" fill="#8899aa" font-weight="400">10+ Years of Trusted Solutions</text>

  <!-- Bilingual note -->
  <text x="600" y="520" font-family="'Inter', system-ui, sans-serif" font-size="24" text-anchor="middle" fill="rgba(240,240,240,0.6)">English &amp; Español</text>

  <!-- Domain -->
  <text x="600" y="600" font-family="'Inter', system-ui, sans-serif" font-size="20" text-anchor="middle" fill="rgba(136,153,170,0.8)">medicaregreat.com</text>
</svg>